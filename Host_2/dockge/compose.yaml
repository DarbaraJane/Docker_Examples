services:
  tunnel:
    image: louislam/dockge:1.5.0
    container_name: dockge
    restart: unless-stopped
    networks:
      - traefik_proxy
    command:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudflare.rule=Host(`${URL}`)"
      - "traefik.http.routers.cloudflare.entrypoints=websecure"
      - "traefik.http.routers.cloudflare.tls.certresolver=<RESOLVER>"
      - "traefik.http.services.cloudflare.loadbalancer.server.port=${PORT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /opt/stacks:/opt/stacks

networks:
   traefik_proxy:
    name: traefik_proxy
    external: true